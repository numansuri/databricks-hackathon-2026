bundle:
  name: referral_copilot

sync:
  exclude:
    - recommender/data/*.csv

resources:
  apps:
    referral_copilot:
      name: referral-copilot
      source_code_path: .
      description: Shiftlink doctor and hospital scheduling exchange prototype.
      resources:
        - name: google_maps_api_key
          description: Google Maps JavaScript API key for the map workspace.
          secret:
            scope: referral-copilot
            key: google-maps-api-key
            permission: READ
        - name: openai_api_key
          description: OpenAI API key for Shiftlink chat and transcription endpoints.
          secret:
            scope: referral-copilot
            key: openai-api-key
            permission: READ
        - name: shiftlink_sql_warehouse
          description: SQL warehouse used by Shiftlink to query Lakehouse-backed facility data.
          sql_warehouse:
            id: 260da0aaab951fdb
            permission: CAN_USE
        - name: shiftlink_gold_facilities
          description: Enriched Virtue Foundation facility table used by the live app.
          uc_securable:
            securable_full_name: workspace.virtue_foundation_enriched.gold_facilities
            securable_type: TABLE
            permission: SELECT
      config:
        command:
          - npm
          - run
          - start
        env:
          - name: GOOGLE_MAPS_API_KEY
            value_from: google_maps_api_key
          - name: VITE_GOOGLE_MAPS_API_KEY
            value_from: google_maps_api_key
          - name: GOOGLE_MAPS_MAP_ID
            value: DEMO_MAP_ID
          - name: OPENAI_API_KEY
            value_from: openai_api_key
          - name: OPENAI_MODEL
            value: gpt-5.5
          - name: OPENAI_REASONING_EFFORT
            value: medium
          - name: OPENAI_STREAM_TIMEOUT_MS
            value: "45000"
          - name: SHIFTLINK_DATA_MODE
            value: lakehouse
          - name: DATABRICKS_SQL_WAREHOUSE_ID
            value_from: shiftlink_sql_warehouse
          - name: SHIFTLINK_FACILITIES_TABLE
            value_from: shiftlink_gold_facilities

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://dbc-87f85fc5-dc00.cloud.databricks.com
