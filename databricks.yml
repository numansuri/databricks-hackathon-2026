bundle:
  name: referral_copilot

resources:
  apps:
    referral_copilot:
      name: referral-copilot
      source_code_path: .
      description: Shiftlink — place specialist volunteers where the need is highest.
      resources:
        - name: outreach_model
          description: Foundation Model serving endpoint used to draft outreach messages.
          serving_endpoint:
            name: databricks-llama-4-maverick
            permission: CAN_QUERY
      config:
        command:
          - npm
          - run
          - start
        env:
          - name: LLM_PROVIDER
            value: databricks
          - name: OUTREACH_MODEL
            value_from: outreach_model

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://dbc-87f85fc5-dc00.cloud.databricks.com
